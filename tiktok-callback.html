<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TikTok OAuth Callback</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #07140f; color: #f5f1e8; font-family: Inter, system-ui, sans-serif; }
      main { width: min(720px, calc(100% - 32px)); padding: 32px; border: 1px solid rgba(255,255,255,.16); border-radius: 28px; background: rgba(255,255,255,.08); }
      h1 { margin-top: 0; }
      pre { white-space: pre-wrap; word-break: break-all; padding: 16px; border-radius: 16px; background: rgba(0,0,0,.24); }
      button { min-height: 44px; padding: 0 16px; border: 0; border-radius: 999px; font-weight: 800; background: #b5ff6d; color: #102016; cursor: pointer; }
      .muted { color: rgba(245,241,232,.68); }
    </style>
  </head>
  <body>
    <main>
      <h1>TikTok authorization complete</h1>
      <p class="muted">Copy the authorization code below and exchange it for tokens locally. This page does not send the code anywhere.</p>
      <pre id="output">Reading callback...</pre>
      <button id="copy">Copy code</button>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      const code = params.get("code");
      const error = params.get("error") || params.get("error_description");
      const output = document.getElementById("output");
      output.textContent = error ? `Error: ${error}` : code ? code : "No code found in URL.";
      document.getElementById("copy").addEventListener("click", async () => {
        await navigator.clipboard.writeText(code || output.textContent);
      });
    </script>
  </body>
</html>
